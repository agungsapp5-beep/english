<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buat Soal</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg,#667eea,#764ba2);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;
}

.container {
  width: 100%;
  max-width: 800px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 15px;
  font-size: 22px;
  text-align: center;
}

textarea {
  width: 100%;
  min-height: 120px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  resize: vertical;
  font-size: 16px;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #5563d6;
}

.back-btn {
  background: #444;
  margin-bottom: 12px;
}

.back-btn:hover {
  background: #222;
}

/* RESPONSIVE TAMBAHAN */
@media (max-width: 600px) {
  .card {
    padding: 15px;
  }

  h2 {
    font-size: 18px;
  }

  textarea {
    min-height: 100px;
    font-size: 14px;
  }

  button {
    font-size: 14px;
    padding: 10px;
  }
}
</style>
</head>

<body>

<div class="container">

<button class="back-btn" onclick="location.href='index.html'">⬅ Kembali</button>

<div class="card">
<h2>Tambah Soal</h2>

<textarea id="question" placeholder="Tulis soal..."></textarea>
<button onclick="addTugas()">Tambah</button>

</div>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbw68aPZL-ZfP_poqXvuGSHYpoWWLKEE8wm0p-uv8q8uXcVSQ3EzE3WMwrPDKa9lYDHh/exec";

function addTugas(){
  const question = document.getElementById("question").value;

  if(!question){
    alert("Soal tidak boleh kosong!");
    return;
  }

  fetch(URL,{
    method:"POST",
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },
    body: JSON.stringify({
      type:"tugas",
      action:"create_tugas",
      question:question
    })
  })
  .then(res => res.text())
  .then(res => {
    alert("Soal berhasil ditambahkan!");
    document.getElementById("question").value = "";
  })
  .catch(err => {
    alert("Gagal kirim data!");
  });
}
</script>

</body>
</html>
